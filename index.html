    let questions = [], current = 0, score = 0, highScore = localStorage.getItem("serEstarHighScore") || 0;

    function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

function loadQuestion() {
    document.getElementById("score").innerText = score;
    document.getElementById("high-score").innerText = highScore;
    
    // Set the question and translation
    document.getElementById("question").innerText = questions[current].q;
    document.getElementById("translation").innerText = `(${questions[current].trans})`;
    
    // Reset UI
    document.getElementById("answer").value = "";
    document.getElementById("answer").disabled = false;
    document.getElementById("feedback").innerHTML = "";
    
    // Always show the Submit button
    document.getElementById("action-area").innerHTML = '<button onclick="checkAnswer()">Submit</button>';
}

// Helper function to remove accents
function normalize(str) {
    return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function checkAnswer() {
    let userInput = normalize(document.getElementById("answer").value.trim());
    let correctAnswer = normalize(questions[current].a);
    let feedback = document.getElementById("feedback");

    if (userInput === correctAnswer) {
        score += 10;
        if (score > highScore) {
            highScore = score;
            localStorage.setItem("serEstarHighScore", highScore);
        }
        
        feedback.style.color = "green";
        feedback.innerText = "Correct! Loading next...";
        
        setTimeout(() => {
            current = Math.floor(Math.random() * SerEstar.length);
            loadQuestion();
        }, 1000);
    } else {
        feedback.style.color = "red";
        // This line adds the specific details back:
        feedback.innerHTML = `Incorrect. The answer was: <strong>${questions[current].a}</strong>.<br>${questions[current].rule}`;
        
        // Keep the "Try Again" button
        document.getElementById("action-area").innerHTML = 
            '<button onclick="retry()">Try Again</button>';
    }
}

function retry() {
    // 1. Clear the feedback area
    document.getElementById("feedback").innerHTML = "";
    
    // 2. Clear the input and focus on it
    let inputField = document.getElementById("answer");
    inputField.value = "";
    inputField.disabled = false;
    inputField.focus();
    
    // 3. Put the Submit button back
    document.getElementById("action-area").innerHTML = '<button onclick="checkAnswer()">Submit</button>';
}


questions = SerEstar; 
current = Math.floor(Math.random() * SerEstar.length);
loadQuestion();

    function resetGame() { score = 0; current = 0; questions = shuffle([...SerEstar]); loadQuestion(); }
