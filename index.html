    function loadQuestion() {
        document.getElementById("score").innerText = score;

// Helper function to remove accents
function normalize(str) {
    return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
}

function checkAnswer() {
    let userInput = document.getElementById("answer").value.trim();
    let q = questions[current];
    let submitBtn = document.querySelector("#action-area button");
    
    // Normalize both for comparison
    let isCorrect = normalize(userInput) === normalize(q.a);
    
    document.getElementById("answer").disabled = true;
    submitBtn.disabled = true;

    if (isCorrect) {
        score += 10;
        document.getElementById("score").innerText = score;
        document.getElementById("progress-bar").value = score;
        
        if (score >= 500) {
            document.getElementById("feedback").innerHTML = `<span style="color: green;">Goal Reached! You hit 500!</span>`;
            return;
        }

        if (score > highScore) { 
            highScore = score; 
            localStorage.setItem("serEstarHighScore", highScore); 
        }
        
        document.getElementById("feedback").innerHTML = `<span style="color: green;">Correct!</span><br><span style="font-weight: normal;">${q.trans}</span>`;

            current++;

        }, 3000);
    } else {
        document.getElementById("feedback").innerHTML = `<span style="color: red;">Wrong!</span><br>Correct: <strong>${q.a}</strong><br><small>${q.rule}</small>`;

}
